name: CI

on:
  workflow_dispatch:
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --no-cache -f docker-test-env/Dockerfile -t qa-test-tagging:latest .

      - name: Run tests
        run: docker run --rm qa-test-tagging:latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run quality gates
        run: pytest quality-gates/tests/ --cov=quality-gates/src --cov-fail-under=90