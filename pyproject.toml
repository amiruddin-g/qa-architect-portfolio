[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
addopts = "--strict-markers"
markers = [
    "smoke: runs on every PR, must complete in seconds",
    "regression: full suite, runs nightly or on release branches",
    "critical_path: failure blocks release regardless of speed",
    "slow: excluded from PR builds, runs in nightly pipelines",
]

[tool.coverage.run]
source = ["test-tagging/tests"]
concurrency = ["thread"]